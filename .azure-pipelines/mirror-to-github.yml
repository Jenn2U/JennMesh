trigger:
  branches:
    include:
      - '*'
  tags:
    include:
      - '*'

pool:
  vmImage: ubuntu-latest

variables:
  - group: GitHubMirrorSecrets

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      set -euo pipefail
      git config --global user.email "mirror-bot@magnivation.com"
      git config --global user.name "Mirror Bot"
      GITHUB_URL="https://${GITHUB_PAT}@github.com/Jenn2U/JennMesh.git"
      git remote add github "${GITHUB_URL}" 2>/dev/null || git remote set-url github "${GITHUB_URL}"
      # Push all remote tracking branches (excluding HEAD) as local branches on GitHub
      for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | grep -v '/HEAD$'); do
        branch="${ref#origin/}"
        echo "Pushing branch: ${branch}"
        git push github "refs/remotes/origin/${branch}:refs/heads/${branch}" --force || echo "Warning: failed to push ${branch}"
      done
      # Push all tags
      git push github --tags --force
    displayName: 'Mirror to GitHub: Jenn2U/JennMesh'
    env:
      GITHUB_PAT: $(GITHUB_PAT)
