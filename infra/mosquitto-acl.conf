# JennMesh MQTT ACL Configuration
# Agents publish telemetry; dashboard subscribes to everything

# Agent accounts: can publish to their node topics
user jenn-mesh
topic readwrite jenn/mesh/#

# Dashboard subscriber: read-only access to all mesh topics
user jenn-mesh-dashboard
topic read jenn/mesh/#

# Admin: full access (provisioning, config push)
user jenn-mesh-admin
topic readwrite #
