<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JennMesh — Ask AI</title>
    <script>(function(){var t=localStorage.getItem('jennmesh-theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 160px);
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .chat-header h2 {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.3rem;
            color: var(--text);
        }
        .ollama-status {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--surface);
        }
        .ollama-status.online { color: var(--primary); border: 1px solid var(--primary); }
        .ollama-status.offline { color: var(--accent); border: 1px solid var(--accent); }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg-user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-assistant {
            align-self: flex-start;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-dim, var(--text-muted));
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
        }
        .msg-thinking {
            align-self: flex-start;
            color: var(--primary);
            font-style: italic;
            padding: 10px 14px;
        }
        .msg-thinking .dot-pulse { display: inline-block; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

        .canned-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 0;
        }
        .canned-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .canned-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(var(--primary-rgb),0.08);
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 0;
            border-top: 1px solid var(--border);
        }
        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .input-bar input:focus { border-color: var(--primary); }
        .input-bar button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-bar button:hover { background: var(--primary-dark); }
        .input-bar button:disabled { background: var(--surface-2); cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="logo">
            <img src="/static/images/jennmesh-avatar.png" alt="JennMesh" class="logo-avatar">
            <h1>JennMesh</h1>
            <span class="version">v{{ version }}</span>
        </div>
        <nav>
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/topology" class="nav-link">Topology</a>
            <a href="/fleet-query" class="nav-link active">Ask AI</a>
            <button id="theme-toggle" class="btn-sm" title="Toggle theme" style="margin-left:0.5rem;padding:0.3rem 0.5rem;line-height:1">
                <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </nav>
    </header>

    <main>
        <div class="chat-container">
            <div class="chat-header">
                <h2>Fleet Query Assistant</h2>
                <span id="ollama-badge" class="ollama-status offline">Checking...</span>
            </div>

            <div class="messages" id="messages"></div>

            <div class="canned-queries" id="canned-queries"></div>

            <div class="input-bar">
                <input type="text" id="query-input" placeholder="Ask about your fleet..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </main>

    <footer>
        <span>JennMesh v{{ version }} — Magnivation JENN Ecosystem</span>
    </footer>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const cannedEl = document.getElementById('canned-queries');
        const ollamaBadge = document.getElementById('ollama-badge');

        function addMessage(text, role, meta) {
            const div = document.createElement('div');
            div.className = 'msg msg-' + role;
            div.textContent = text;
            if (meta) {
                const metaEl = document.createElement('div');
                metaEl.className = 'msg-meta';
                metaEl.textContent = meta;
                div.appendChild(metaEl);
            }
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function showThinking() {
            const div = document.createElement('div');
            div.className = 'msg-thinking';
            div.id = 'thinking';
            const textNode = document.createTextNode('Thinking');
            div.appendChild(textNode);
            const dots = document.createElement('span');
            dots.className = 'dot-pulse';
            dots.textContent = '...';
            div.appendChild(dots);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        async function sendQuestion(question) {
            if (!question.trim()) return;
            addMessage(question, 'user');
            inputEl.value = '';
            sendBtn.disabled = true;
            showThinking();

            try {
                const resp = await fetch('/api/v1/fleet-query/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await resp.json();
                hideThinking();

                if (resp.ok) {
                    const meta = data.source + ' \u00b7 ' + data.duration_ms + 'ms';
                    addMessage(data.answer, 'assistant', meta);
                } else {
                    addMessage('Error: ' + (data.detail || resp.statusText), 'assistant');
                }
            } catch (err) {
                hideThinking();
                addMessage('Network error: ' + err.message, 'assistant');
            }
            sendBtn.disabled = false;
            inputEl.focus();
        }

        sendBtn.addEventListener('click', function() { sendQuestion(inputEl.value); });
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendQuestion(inputEl.value);
        });

        // Load status
        fetch('/api/v1/fleet-query/status')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ollama_available) {
                    ollamaBadge.textContent = 'Ollama Online';
                    ollamaBadge.className = 'ollama-status online';
                } else {
                    ollamaBadge.textContent = 'Keyword Mode';
                    ollamaBadge.className = 'ollama-status offline';
                }
            })
            .catch(function() {
                ollamaBadge.textContent = 'Offline';
            });

        // Load canned queries
        fetch('/api/v1/fleet-query/canned')
            .then(function(r) { return r.json(); })
            .then(function(queries) {
                queries.forEach(function(q) {
                    var btn = document.createElement('button');
                    btn.className = 'canned-btn';
                    btn.textContent = q.question;
                    btn.title = q.description;
                    btn.addEventListener('click', function() { sendQuestion(q.question); });
                    cannedEl.appendChild(btn);
                });
            });

        // Load history
        fetch('/api/v1/fleet-query/history?limit=10')
            .then(function(r) { return r.json(); })
            .then(function(history) {
                history.reverse().forEach(function(h) {
                    addMessage(h.question, 'user');
                    var meta = h.source + ' \u00b7 ' + h.duration_ms + 'ms';
                    addMessage(h.result_summary || 'No response recorded', 'assistant', meta);
                });
            });

        inputEl.focus();

        // Theme toggle
        (function() {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            var moon = document.getElementById('theme-icon-moon');
            var sun = document.getElementById('theme-icon-sun');
            function applyIcons(theme) {
                if (!moon || !sun) return;
                moon.style.display = theme === 'dark' ? 'none' : '';
                sun.style.display = theme === 'dark' ? '' : 'none';
            }
            applyIcons(document.documentElement.getAttribute('data-theme') || 'dark');
            btn.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('jennmesh-theme', next);
                applyIcons(next);
            });
        })();
    </script>
</body>
</html>
