<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JennMesh — Topology Visualization</title>
    <script>(function(){var t=localStorage.getItem('jennmesh-theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();</script>
    <link rel="stylesheet" href="/static/css/topology-viz.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header class="top-bar">
        <div class="logo">
            <span class="logo-icon">&#9041;</span>
            <h1>JennMesh</h1>
            <span class="version">v{{ version }}</span>
        </div>
        <nav>
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/topology" class="nav-link active">Topology</a>
            <button id="theme-toggle" class="btn-sm" title="Toggle theme" style="margin-left:0.5rem;padding:0.3rem 0.5rem;line-height:1">
                <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </nav>
    </header>

    <main class="topology-layout">
        <!-- Graph Area -->
        <div class="graph-container">
            <div class="graph-toolbar">
                <span class="graph-title">Mesh Topology</span>
                <div class="graph-legend">
                    <span class="legend-item">
                        <span class="legend-dot online"></span> Online
                    </span>
                    <span class="legend-item">
                        <span class="legend-dot offline"></span> Offline
                    </span>
                    <span class="legend-item">
                        <span class="legend-dot spof"></span> SPOF
                    </span>
                </div>
                <button id="btn-refresh" class="btn-sm">Refresh</button>
            </div>
            <svg id="topology-svg"></svg>
            <div class="graph-stats" id="graph-stats">
                <span>Nodes: <strong id="stat-nodes">—</strong></span>
                <span>Edges: <strong id="stat-edges">—</strong></span>
                <span>Components: <strong id="stat-components">—</strong></span>
                <span>SPOF: <strong id="stat-spof">—</strong></span>
            </div>
        </div>

        <!-- Detail Sidebar -->
        <aside class="detail-sidebar" id="detail-sidebar">
            <div class="sidebar-placeholder" id="sidebar-placeholder">
                <p>Click a node to view details</p>
            </div>
            <div class="sidebar-content" id="sidebar-content" style="display:none">
                <h3 id="detail-name">—</h3>
                <dl class="detail-list">
                    <dt>Node ID</dt>
                    <dd id="detail-id">—</dd>
                    <dt>Role</dt>
                    <dd id="detail-role">—</dd>
                    <dt>Status</dt>
                    <dd id="detail-status">—</dd>
                    <dt>Neighbors</dt>
                    <dd id="detail-neighbors">—</dd>
                    <dt>Position</dt>
                    <dd id="detail-position">—</dd>
                </dl>
                <h4>Connections</h4>
                <ul id="detail-edges" class="edge-list"></ul>
            </div>
        </aside>
    </main>

    <footer>
        <span>JennMesh v{{ version }} — Magnivation JENN Ecosystem</span>
    </footer>

    <script src="/static/js/topology-viz.js"></script>
    <script>
        (function() {
            var btn = document.getElementById('theme-toggle');
            if (!btn) return;
            var moon = document.getElementById('theme-icon-moon');
            var sun = document.getElementById('theme-icon-sun');
            function applyIcons(theme) {
                if (!moon || !sun) return;
                moon.style.display = theme === 'dark' ? 'none' : '';
                sun.style.display = theme === 'dark' ? '' : 'none';
            }
            applyIcons(document.documentElement.getAttribute('data-theme') || 'dark');
            btn.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('jennmesh-theme', next);
                applyIcons(next);
            });
        })();
    </script>
</body>
</html>
