# Mosquitto MQTT Broker — JennMesh Physical Deployment
# Installed to: /etc/jenn-mesh/mosquitto.conf
# Data dir:     /var/lib/jenn-mesh/mosquitto/
# Port:         1884 (separate from any IoT broker on 1883)

# ── Listeners ───────────────────────────────────────────────────
# Plain MQTT — LAN only (firewall restricts external access)
listener 1884 0.0.0.0
protocol mqtt

# TLS listener — uncomment when certificates are provisioned
# listener 8884
# protocol mqtt
# certfile /etc/jenn-mesh/certs/fullchain.pem
# keyfile /etc/jenn-mesh/certs/privkey.pem
# tls_version tlsv1.2

# ── Authentication ──────────────────────────────────────────────
allow_anonymous false
password_file /etc/jenn-mesh/mosquitto_passwd

# ── Persistence ─────────────────────────────────────────────────
persistence true
persistence_location /var/lib/jenn-mesh/mosquitto/
autosave_interval 300

# ── Logging ─────────────────────────────────────────────────────
# Log to stdout for journald capture
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Connection Limits ───────────────────────────────────────────
max_connections 200
max_inflight_messages 50
max_queued_messages 1000
message_size_limit 8192
