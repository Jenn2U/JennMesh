repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--max-line-length=100]

  - repo: local
    hooks:
      - id: check-contract-versions
        name: check contract version alignment
        entry: python scripts/check_contract_versions.py
        language: system
        always_run: true
        pass_filenames: false

      - id: pytest-unit
        name: pytest unit tests
        entry: pytest tests/ -v --no-cov -m "not integration"
        language: system
        always_run: true
        pass_filenames: false
